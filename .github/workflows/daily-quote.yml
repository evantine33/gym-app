name: Daily Motivational Quote

on:
  schedule:
    # Fires at 1:00 PM UTC = 9:00 AM ET / 8:00 AM CT / 6:00 AM PT
    # Adjust the hour to match your gym's timezone preference
    - cron: '0 13 * * *'
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab for testing

jobs:
  send-quote:
    name: Send daily quote to all Gymi members
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send motivational quote via OneSignal
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node --input-type=module < scripts/send-daily-quote.js
